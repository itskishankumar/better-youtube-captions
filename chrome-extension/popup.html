<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Caption Replacer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <h1>YouTube Caption Replacer</h1>

      <section class="panel">
        <div class="label">Current video</div>
        <div id="videoStatus" class="value">Checking current tab...</div>
        <div id="videoMeta" class="meta"></div>
      </section>

      <section class="panel">
        <div class="label">Server</div>
        <input id="serverUrl" type="text" class="text-input" placeholder="ws://localhost:8080">
        <button id="generateButton" type="button" class="primary">Generate Captions</button>
        <div id="streamStatus" class="meta"></div>
      </section>

      <section class="panel">
        <div class="label">Or load an existing file</div>
        <label class="file-picker" for="srtFile">Choose SRT File</label>
        <input id="srtFile" type="file" accept=".srt,text/plain">
        <div id="fileMeta" class="meta">No SRT selected for this video.</div>
      </section>

      <section class="actions">
        <button id="clearButton" type="button" class="secondary">Clear captions for this video</button>
      </section>

      <p id="statusMessage" class="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
